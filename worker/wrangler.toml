name = "jtt-auth-worker"
main = "auth-worker.js"
compatibility_date = "2024-09-01"

# KV namespace — replace the ID after running:
#   npx wrangler kv namespace create AUTH_KV
# OR create it in Cloudflare Dashboard → Workers → KV
[[kv_namespaces]]
binding = "AUTH_KV"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# Route — serves at jaethetech.com/api/*
[env.production]
routes = [
  { pattern = "jaethetech.com/api/*", zone_name = "jaethetech.com" }
]
